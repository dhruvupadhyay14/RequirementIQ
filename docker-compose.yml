version: '3.8'
services:
  web:
    build:
      context: .
      dockerfile: ./docker/Dockerfile.web
      args:
        - APP_DIR=./apps/web
    ports:
      - '5173:5173'
    environment:
      - VITE_API_URL=http://localhost:8000
    depends_on:
      - api

  api:
    build:
      context: .
      dockerfile: ./docker/Dockerfile.api
      args:
        - APP_DIR=./apps/api
    ports:
      - '8000:8000'
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      - postgres

  postgres:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: requirementiq
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data

  chroma:
    image: chromaai/chroma:latest
    ports:
      - '8001:8000'
    environment:
      - CHROMA_SERVER_HOST=0.0.0.0

volumes:
  pgdata:
    driver: local
