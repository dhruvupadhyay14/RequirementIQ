version: '3.8'
services:
  web:
    build:
      context: .
      dockerfile: ./docker/Dockerfile.web
      args:
        - APP_DIR=./apps/web
    ports:
      - '5173:5173'
    environment:
      - VITE_API_URL=http://localhost:8000
    depends_on:
      - api
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: ./docker/Dockerfile.api
      args:
        - APP_DIR=./apps/api
    ports:
      - '8000:8000'
    env_file:
      - .env.example
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      - postgres
    restart: unless-stopped

  postgres:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: requirementiq
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    ports:
      - '6379:6379'
    restart: unless-stopped

  chroma:
    image: chromaai/chroma:latest
    ports:
      - '8001:8000'
    environment:
      - CHROMA_SERVER_HOST=0.0.0.0
    restart: unless-stopped

volumes:
  pgdata:
    driver: local
